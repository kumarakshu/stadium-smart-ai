<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.firebaseio.com https://firebase.googleapis.com; worker-src 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>SmartStadium AI | Control Command</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding-bottom: 0; }
        .admin-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        @media (max-width: 900px) {
            .admin-grid { grid-template-columns: 1fr; }
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: var(--bg-primary);
            border-radius: 0.5rem;
        }
        input[type="range"] {
            width: 100px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
        }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div id="view-title">
            <i data-lucide="shield-check"></i>
            Command Center
        </div>
        <div style="display: flex; gap: 0.75rem; align-items: center;">
            <div style="font-size: 0.8rem; color: var(--text-2);">
                Live Status: <span style="color: var(--low);">● Connected</span>
            </div>
            <!-- Standard spacing/size consistency -->
        </div>
    </header>

    <main style="max-width: 1200px;">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Attendees</div>
                <div class="stat-val">42,501</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg. Wait Time</div>
                <div class="stat-val" id="stat-wait">8m</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Alerts</div>
                <div class="stat-val" id="stat-alerts" style="color: var(--low);">0</div>
            </div>
        </div>

        <div class="admin-grid">
            <!-- Left Column: Map & Monitoring -->
            <div class="column">
                <div class="card">
                    <h2 class="card-title"><i data-lucide="layout"></i> Stadium Overview (Digital Twin)</h2>
                    <div class="map-container" id="admin-map-box" style="height: 400px;">
                        <!-- SVG injected via JS -->
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title"><i data-lucide="alert-circle"></i> Incident Log</h2>
                    <div id="log-list" style="font-size: 0.85rem;">
                        <div style="color: var(--text-secondary); font-style: italic;">No active incidents.</div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Controls -->
            <div class="column">
                <div class="card">
                    <h2 class="card-title"><i data-lucide="sliders"></i> Crowd Management</h2>
                    <div id="zone-controls">
                        <!-- Sliders move here -->
                    </div>
                </div>

                <div class="card" style="border-top: 4px solid var(--sos);">
                    <h2 class="card-title"><i data-lucide="megaphone"></i> Emergency Broadcast</h2>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <button class="btn btn-primary" style="background: var(--sos); width: 100%;" id="br-evac">
                            Broadcast Evacuation
                        </button>
                        <button class="btn" style="border: 1px solid var(--border); width: 100%;" id="br-clear">
                            Clear All Alerts
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modular Admin Scripts (Top 50 Architecture) -->
    <script src="src/data/config.js?v=2.0"></script>
    <script src="src/engine/state.js?v=2.0"></script>
    <script src="src/admin.js?v=2.0"></script>

    <!-- Google Services Active Integration: Firebase Authentication & Analytics -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            projectId: "promptai-493007",
            appId: "1:123456789:web:abcdef12345678",
            apiKey: "AIzaSy_MOCK_FIREBASE_KEY_FOR_TESTS",
            measurementId: "G-SMARTCITY1"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        window.firebaseIntegration = { app, analytics, auth };
    </script>
</body>
</html>
